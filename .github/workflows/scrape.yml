name: Scrape Vulnerability Feed

on:
  schedule:
    # Every 4 hours — vulns move faster than general news
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          NVD_API_KEY:   ${{ secrets.NVD_API_KEY }}
          VULDB_API_KEY: ${{ secrets.VULDB_API_KEY }}
          OTX_API_KEY:   ${{ secrets.OTX_API_KEY }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: python scraper.py

      - name: Commit updated feed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.json feed.json feed-2.json feed-3.json feed-4.json feed-5.json
          git diff --staged --quiet || git commit -m "chore: update vuln feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
