<!--
  VULNERABILITY FEED — WordPress Custom HTML Block
  ==================================================
  Change ONE line before publishing:
    const FEED_BASE = 'https://YOUR-VULN-PROJECT.vercel.app';

  Categories: emergency · infrastructure · web_app · cloud
  Extra fields displayed: CVE IDs, CVSS score, related source links
-->

<div id="vf-feed">

  <!--
  <div class="vf-ad-banner">YOUR AD CODE HERE</div>
  -->

  <div class="vf-header">
    <h2 class="vf-title">Vulnerability Intelligence</h2>
    <p class="vf-subtitle">Active exploits, CVEs, and zero-days · Updated every 4 hours</p>

    <div class="vf-tabs" id="vf-tabs" role="tablist">
      <button class="vf-tab vf-tab--active" data-cat="all"            role="tab" aria-pressed="true">All</button>
      <button class="vf-tab"                 data-cat="emergency"      role="tab" aria-pressed="false">⚠ Emergency</button>
      <button class="vf-tab"                 data-cat="infrastructure" role="tab" aria-pressed="false">Infrastructure</button>
      <button class="vf-tab"                 data-cat="web_app"        role="tab" aria-pressed="false">Web / App</button>
      <button class="vf-tab"                 data-cat="cloud"          role="tab" aria-pressed="false">Cloud</button>
    </div>

    <input id="vf-search" class="vf-search" type="search"
           placeholder="Search CVE ID, product, keyword…"
           aria-label="Search vulnerabilities" />
  </div>

  <div id="vf-list" role="feed" aria-label="Vulnerability intelligence feed">
    <p class="vf-status">Loading…</p>
  </div>

  <nav class="vf-pagination" id="vf-pagination" aria-label="Feed pages">
    <button class="vf-page-btn" id="vf-prev" disabled>← Previous</button>
    <span class="vf-page-info" id="vf-page-info"></span>
    <button class="vf-page-btn" id="vf-next" disabled>Next →</button>
  </nav>

  <p class="vf-footer">
    <span id="vf-updated"></span>
    <span aria-hidden="true"> · </span>
    <a id="vf-feedlink" href="#" target="_blank" rel="noopener noreferrer">Feed source</a>
    <span aria-hidden="true"> · </span>
    CVE data sourced from NVD, CISA, and community disclosures.
  </p>

</div>

<style>
#vf-feed { max-width: 800px; margin: 0 auto; }
#vf-feed .vf-ad-banner { margin-bottom: 1.5em; text-align: center; }
#vf-feed .vf-title  { margin: 0 0 0.2em; }
#vf-feed .vf-subtitle { margin: 0 0 1em; font-size: 0.82em; opacity: 0.65; }
#vf-feed .vf-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75em; }
#vf-feed .vf-tab {
  background: transparent; border: 1px solid currentColor; border-radius: 3px;
  padding: 4px 12px; font-size: 0.78em; font-weight: 600; cursor: pointer;
  opacity: 0.5; transition: opacity 0.15s; color: inherit; font-family: inherit;
  letter-spacing: 0.03em;
}
#vf-feed .vf-tab:hover { opacity: 0.8; }
#vf-feed .vf-tab--active { opacity: 1; background: rgba(0,0,0,0.06); }
#vf-feed .vf-search {
  width: 100%; padding: 7px 10px; font-size: 0.88em; font-family: inherit;
  border: 1px solid rgba(0,0,0,0.2); border-radius: 3px; background: transparent;
  color: inherit; margin-bottom: 1.1em; box-sizing: border-box;
}
#vf-feed .vf-search:focus { outline: 2px solid currentColor; outline-offset: 1px; }

/* Items */
#vf-feed #vf-list { margin: 0; padding: 0; }
#vf-feed .vf-item {
  display: flex; flex-direction: column; gap: 5px;
  padding: 13px 0; border-bottom: 1px solid rgba(0,0,0,0.1);
}
#vf-feed .vf-item:last-child { border-bottom: none; }
#vf-feed .vf-item-title {
  font-size: 0.97em; font-weight: 600; line-height: 1.4; text-decoration: none;
}
#vf-feed .vf-item-title:hover { text-decoration: underline; }

/* Meta row */
#vf-feed .vf-item-meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  font-size: 0.75em; opacity: 0.7;
}
#vf-feed .vf-source { font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

/* Category badges */
#vf-feed .vf-cat {
  display: inline-block; padding: 1px 7px; border-radius: 2px;
  font-size: 0.9em; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
#vf-feed .vf-cat--emergency      { background:#fde8ec; color:#b01c35; }
#vf-feed .vf-cat--infrastructure { background:#fef0e0; color:#9a5000; }
#vf-feed .vf-cat--web_app        { background:#e8f0fe; color:#1a5fb0; }
#vf-feed .vf-cat--cloud          { background:#e8f8f0; color:#1a7a46; }

/* CVSS badge */
#vf-feed .vf-cvss {
  display: inline-block; padding: 1px 7px; border-radius: 2px;
  font-size: 0.9em; font-weight: 700; font-family: monospace;
  background: rgba(0,0,0,0.07);
}
#vf-feed .vf-cvss--critical { background:#fde8ec; color:#b01c35; }
#vf-feed .vf-cvss--high     { background:#fef0e0; color:#9a5000; }
#vf-feed .vf-cvss--medium   { background:#fefbe0; color:#7a6000; }

/* CVE IDs */
#vf-feed .vf-cve-list {
  display: flex; flex-wrap: wrap; gap: 5px; font-size: 0.75em;
}
#vf-feed .vf-cve {
  background: rgba(0,0,0,0.05); border-radius: 3px;
  padding: 1px 6px; font-family: monospace; font-weight: 600;
}

/* Summary */
#vf-feed .vf-item-summary {
  font-size: 0.84em; line-height: 1.5; opacity: 0.75;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* Related links */
#vf-feed .vf-related {
  font-size: 0.78em; opacity: 0.65;
}
#vf-feed .vf-related a { margin-right: 8px; }

/* Pagination */
#vf-feed .vf-pagination {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-top: 1.4em; padding-top: 1em;
  border-top: 1px solid rgba(0,0,0,0.1);
}
#vf-feed .vf-page-btn {
  background: transparent; border: 1px solid currentColor; border-radius: 3px;
  padding: 6px 16px; font-size: 0.82em; font-weight: 600; cursor: pointer;
  color: inherit; font-family: inherit; opacity: 0.7; transition: opacity 0.15s;
}
#vf-feed .vf-page-btn:hover:not(:disabled) { opacity: 1; }
#vf-feed .vf-page-btn:disabled { opacity: 0.25; cursor: default; }
#vf-feed .vf-page-info { font-size: 0.8em; opacity: 0.6; text-align: center; flex: 1; }
#vf-feed .vf-status { padding: 2em 0; text-align: center; opacity: 0.55; font-size: 0.9em; }
#vf-feed .vf-footer { margin-top: 1em; font-size: 0.75em; opacity: 0.55; }

@media (prefers-color-scheme: dark) {
  #vf-feed .vf-tab--active      { background: rgba(255,255,255,0.08); }
  #vf-feed .vf-search           { border-color: rgba(255,255,255,0.2); }
  #vf-feed .vf-item             { border-bottom-color: rgba(255,255,255,0.1); }
  #vf-feed .vf-pagination       { border-top-color: rgba(255,255,255,0.1); }
  #vf-feed .vf-cve              { background: rgba(255,255,255,0.08); }
  #vf-feed .vf-cvss             { background: rgba(255,255,255,0.08); }
  #vf-feed .vf-cat--emergency      { background:#4a0a18; color:#ff8fa3; }
  #vf-feed .vf-cat--infrastructure { background:#3d2000; color:#ffb865; }
  #vf-feed .vf-cat--web_app        { background:#0a1a3d; color:#7aadff; }
  #vf-feed .vf-cat--cloud          { background:#0a2a1a; color:#5adba0; }
}
</style>

<script>
(function () {
  'use strict';

  // *** Replace with your Vercel URL (no trailing slash) ***
  const FEED_BASE = 'https://YOUR-VULN-PROJECT.vercel.app';

  function pageUrl(n) {
    return n === 1 ? FEED_BASE + '/feed.json' : FEED_BASE + '/feed-' + n + '.json';
  }

  let pageArticles   = [];
  let currentPage    = 1;
  let totalPages     = 1;
  let activeCategory = 'all';
  let searchQuery    = '';

  const listEl    = document.getElementById('vf-list');
  const tabs      = document.querySelectorAll('#vf-tabs .vf-tab');
  const searchEl  = document.getElementById('vf-search');
  const updatedEl = document.getElementById('vf-updated');
  const feedLink  = document.getElementById('vf-feedlink');
  const prevBtn   = document.getElementById('vf-prev');
  const nextBtn   = document.getElementById('vf-next');
  const pageInfo  = document.getElementById('vf-page-info');

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    } catch (_) { return ''; }
  }

  function cvssClass(score) {
    if (!score) return '';
    if (score >= 9.0) return 'vf-cvss--critical';
    if (score >= 7.0) return 'vf-cvss--high';
    return 'vf-cvss--medium';
  }

  function render() {
    const q = searchQuery.trim().toLowerCase();
    const visible = pageArticles.filter(a => {
      const catOk = activeCategory === 'all' || a.category === activeCategory;
      const cveMatch = (a.cve_ids || []).some(c => c.toLowerCase().includes(q));
      const searchOk = !q || cveMatch ||
        a.title.toLowerCase().includes(q) ||
        (a.summary || '').toLowerCase().includes(q) ||
        a.source.toLowerCase().includes(q);
      return catOk && searchOk;
    });

    if (!visible.length) {
      listEl.innerHTML = '<p class="vf-status">No entries match this filter on this page.</p>';
    } else {
      listEl.innerHTML = visible.map(a => {
        const cves = (a.cve_ids || []).map(c =>
          `<span class="vf-cve">${esc(c)}</span>`).join('');
        const cvssScore = a.cvss
          ? `<span class="vf-cvss ${cvssClass(a.cvss)}">CVSS ${parseFloat(a.cvss).toFixed(1)}</span>`
          : '';
        const related = (a.related_links || []).length
          ? `<div class="vf-related">Also reported by: ${
              a.related_links.slice(0,5).map((u,i) =>
                `<a href="${esc(u)}" target="_blank" rel="noopener noreferrer nofollow">Source ${i+2}</a>`
              ).join('')
            }</div>`
          : '';

        return `
          <div class="vf-item">
            <a class="vf-item-title"
               href="${esc(a.url)}" target="_blank"
               rel="noopener noreferrer nofollow">${esc(a.title)}</a>
            <div class="vf-item-meta">
              <span class="vf-source">${esc(a.source)}</span>
              <span aria-hidden="true">·</span>
              <span class="vf-cat vf-cat--${esc(a.category)}">${esc(a.category.replace('_',' '))}</span>
              ${cvssScore}
              <span aria-hidden="true">·</span>
              <time datetime="${esc(a.date)}">${fmtDate(a.date)}</time>
            </div>
            ${cves ? `<div class="vf-cve-list">${cves}</div>` : ''}
            ${a.summary ? `<p class="vf-item-summary">${esc(a.summary)}</p>` : ''}
            ${related}
          </div>`;
      }).join('');
    }

    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    pageInfo.textContent = totalPages > 1 ? `Page ${currentPage} of ${totalPages}` : '';
  }

  async function loadPage(n) {
    listEl.innerHTML = '<p class="vf-status">Loading…</p>';
    prevBtn.disabled = true; nextBtn.disabled = true;
    try {
      const res  = await fetch(pageUrl(n), { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      pageArticles = data.articles || [];
      currentPage  = data.page        || n;
      totalPages   = data.total_pages || 1;
      if (data.updated) updatedEl.textContent = 'Last updated ' + fmtDate(data.updated);
      feedLink.href  = pageUrl(1);
      searchEl.value = ''; searchQuery = '';
      render();
      document.getElementById('vf-feed').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      listEl.innerHTML = `<p class="vf-status">Could not load feed.<br><small>${esc(String(err))}</small></p>`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }
  }

  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => { x.classList.remove('vf-tab--active'); x.setAttribute('aria-pressed','false'); });
    t.classList.add('vf-tab--active'); t.setAttribute('aria-pressed','true');
    activeCategory = t.dataset.cat; render();
  }));

  let dbt;
  searchEl.addEventListener('input', () => {
    clearTimeout(dbt);
    dbt = setTimeout(() => { searchQuery = searchEl.value; render(); }, 250);
  });

  prevBtn.addEventListener('click', () => { if (currentPage > 1) loadPage(currentPage - 1); });
  nextBtn.addEventListener('click', () => { if (currentPage < totalPages) loadPage(currentPage + 1); });

  loadPage(1);
}());
</script>
